<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Build: {{ course.name }} — Project Mario</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/builder.css') }}">
</head>
<body>
    <div class="builder-toolbar">
        <a href="{{ url_for('web.course_detail', course_id=course.id) }}" class="toolbar-link">Back to Course</a>
        <span class="toolbar-title">{{ course.name }}</span>
        <div class="plate-type-badge">
            <span class="plate-type-label" id="plate-type-label"></span>
        </div>
        <button id="save-btn" class="toolbar-btn save-btn">Save</button>
        <span id="save-status" class="save-status"></span>
    </div>

    <div class="builder-layout">
        <div class="palette">
            <div class="palette-header">
                <input type="text" id="palette-search" placeholder="Search tiles...">
            </div>
            <div class="palette-categories" id="palette-categories"></div>
            <div class="palette-tiles" id="palette-tiles"></div>
        </div>

        <div class="canvas-area">
            <div class="plate-nav">
                <button id="prev-plate" class="toolbar-btn plate-nav-btn" disabled>&larr;</button>
                <span id="plate-indicator" class="plate-indicator"></span>
                <button id="next-plate" class="toolbar-btn plate-nav-btn">&rarr;</button>
                <button id="add-plate" class="toolbar-btn add-plate-btn" title="Add a new plate">+ Add Plate</button>
                <button id="remove-plate" class="toolbar-btn remove-plate-btn" title="Remove current plate (must be empty)">Remove Plate</button>
            </div>

            <div class="canvas-wrapper">
                <div class="canvas" id="canvas"></div>
            </div>
        </div>
    </div>

    <script>
        window.COURSE_ID = {{ course.id }};
        window.PLATE_TYPE = "{{ course.plate_type }}";
        window.PLATE_STUDS = {{ course.PLATE_STUDS }};
        window.API_BASE = "{{ url_for('api.list_tiles') }}".replace('/tiles', '');
    </script>
    <script src="{{ url_for('static', filename='js/builder.js') }}"></script>
</body>
</html>
